<!DOCTYPE html>
<html>
<head>
    <title>TripSafe CA | Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-white">
<div class="container py-4">
    
    <div class="d-flex justify-content-between align-items-center">
        <h2>Dashboard: <span class="text-primary">{{ filename }}</span></h2>
        <a href="/" class="btn btn-sm btn-outline-dark">Back to Catalog</a>
    </div>
    <hr>

    <div class="row mb-4">
        <div class="col-md-6">
            <form action="/results" method="GET" class="input-group">
                <input type="hidden" name="filename" value="{{ filename }}">
                
                <input type="text" name="city" class="form-control" placeholder="Filter by City (e.g., San Diego)" value="{{ city }}">
                
                <button class="btn btn-dark" type="submit">Apply Filter</button>
            </form>
        </div>
    </div>

    {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
    {% else %}
        
        <div class="row text-center mb-4">
            {% for key, val in stats.items() %}
            <div class="col-md-3 mb-2">
                <div class="card bg-light border-secondary p-3 shadow-sm">
                    <h6 class="text-muted text-uppercase mb-1">{{ key.replace('_', ' ') }}</h6>
                    <h3 class="mb-0">{{ val }}</h3>
                </div>
            </div>
            {% endfor %}
        </div>

        <div class="row">
            <div class="col-12">
                <div class="card p-3 shadow-sm text-center">
                    <h4 class="mb-3">Detailed Data Visualization</h4>
                    <img src="{{ url_for('static', filename='plots/' + plot_img) }}" class="img-fluid rounded border" alt="Data Plot" style="max-height: 500px; object-fit: contain;">
                </div>
            </div>
        </div>

    {% endif %}
</div>
</body>
</html>
