<!DOCTYPE html>
<html>
<head>
    <title>TripSafe CA | Selector</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <h1 class="display-4 text-primary">TripSafe California</h1>
    <p class="lead">Select a live dataset from the California Open Data Portal.</p>
    <hr>

    <div class="card shadow-sm p-4">
        <form id="downloadForm" action="/process" method="POST">
            
            <label class="form-label fw-bold">1. Choose a Dataset to Gather:</label>
            <select name="dataset" class="form-select mb-4" required>
                <option value="" disabled selected>Select a dataset...</option>
                {% for item in datasets %}
                    <option value="{{ item.download_url }}|{{ item.filename }}">{{ item.display }}</option>
                {% endfor %}
            </select>

            <button type="submit" class="btn btn-primary btn-lg" id="submitBtn">Download & Analyze Data</button>
            <a href="/" class="btn btn-outline-secondary btn-lg">Refresh Links</a>
        </form>

        <div id="loadingUI" style="display: none;" class="mt-4 text-center">
            <h5 class="text-primary mb-3">Downloading and processing data... Please wait.</h5>
            <div class="progress" style="height: 25px;">
                <div class="progress-bar progress-bar-striped progress-bar-animated w-100" role="progressbar"></div>
            </div>
        </div>

    </div>
</div>

<script>
    document.getElementById('downloadForm').addEventListener('submit', function() {
        document.getElementById('submitBtn').style.display = 'none';
        document.getElementById('loadingUI').style.display = 'block';
    });
</script>
</body>
</html>
